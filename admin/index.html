<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Cóc Sài Gòn</title>
  <link rel="icon" type="image/png" href="/csg-favicon.png" />
  <meta property="og:image" content="https://i.ibb.co/xkr0QFB/csg-thumb.jpg" />
  <meta name="twitter:image" content="https://i.ibb.co/xkr0QFB/csg-thumb.jpg" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    /* Login styles */
    .login-container {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary, #0d0d0d);
      padding: 20px;
      box-sizing: border-box;
    }
    .login-card {
      background: var(--bg-card, #111);
      border: 1px solid var(--border-color, #333);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-card img {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
    }
    .login-card h1 {
      color: var(--text-primary, #fff);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-card p {
      color: var(--text-secondary, #999);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .login-card .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .login-card .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary, #999);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-card .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color, #333);
      background: var(--bg-primary, #000);
      color: var(--text-primary, #fff);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .login-card .form-group input:focus {
      border-color: var(--gold-primary, #FFDE21);
    }
    .login-error {
      color: #ff4444;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: var(--gold-primary, #FFDE21);
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading overlay */
    .admin-loading {
      position: fixed; inset: 0;
      background: var(--bg-primary, #000);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    .admin-loading.hidden { opacity: 0; pointer-events: none; }
    .admin-loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: var(--gold-primary, #FFDE21);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="admin-body">

  <!-- Loading -->
  <div class="admin-loading" id="admin-loading">
    <div class="spinner"></div>
  </div>

  <!-- Login Screen -->
  <div class="login-container" id="login-screen" style="display:none;">
    <div class="login-card">
      <img src="/assets/logo/logo.svg" alt="CSG" />
      <h1>CSG Admin</h1>
      <p>Đăng nhập để quản lý nội dung website</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@cocsaigon.vn" />
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="login-btn" id="login-btn">Đăng nhập</button>
    </div>
  </div>

  <!-- Admin Panel (hidden until logged in) -->
  <div id="admin-panel" style="display:none; width: 100%; min-height: 100vh;">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="sidebar-header">
        <img src="/assets/logo/logo.svg" alt="CSG" />
        <span>CSG Admin</span>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link active" data-section="general"><i class="fas fa-cog"></i> Tổng quan</button>
        <button class="sidebar-link" data-section="projects"><i class="fas fa-folder-open"></i> Dự án</button>
        <button class="sidebar-link" data-section="categories"><i class="fas fa-th-large"></i> Chuyên mục</button>
        <button class="sidebar-link" data-section="departments"><i class="fas fa-sitemap"></i> Các Ban</button>
        <button class="sidebar-link" data-section="halloffame"><i class="fas fa-star"></i> Vinh danh</button>
        <button class="sidebar-link" data-section="members"><i class="fas fa-users"></i> Thành viên</button>
        <button class="sidebar-link" data-section="achievements"><i class="fas fa-trophy"></i> Ấn tượng & Đã đồng hành</button>
        <button class="sidebar-link" data-section="about"><i class="fas fa-info-circle"></i> Về Cóc</button>
      </nav>
      <div class="sidebar-footer">
        <button id="btn-logout" class="sidebar-action" style="border-top: 1px solid #333; margin-top: 8px; color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
      </div>
    </aside>

    <!-- Mobile toggle -->
    <button class="admin-menu-toggle" id="admin-menu-toggle"><i class="fas fa-bars"></i></button>

    <!-- Main content -->
    <main class="admin-main" id="admin-main">
      <div class="admin-topbar">
        <h1 id="admin-page-title">Tổng quan</h1>
        <div class="admin-actions">
          <button id="btn-save" class="btn-primary"><i class="fas fa-save"></i> Lưu thay đổi</button>
          <a href="/" target="_blank" class="btn-secondary"><i class="fas fa-external-link-alt"></i> Xem trang</a>
        </div>
      </div>

      <div class="admin-content" id="admin-content">
        <!-- Dynamic content rendered by admin.js -->
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="admin-toast"></div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
