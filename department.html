<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết Ban - Cóc Sài Gòn</title>
  <meta name="description" content="Thông tin chi tiết về các ban của CLB Cóc Sài Gòn." />
  <link rel="icon" type="image/png" href="/csg-favicon.png" />
  <meta property="og:image" content="https://i.ibb.co/xkr0QFB/csg-thumb.jpg" />
  <meta name="twitter:image" content="https://i.ibb.co/xkr0QFB/csg-thumb.jpg" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/header.css" />
  <link rel="stylesheet" href="/css/footer.css" />
  <link rel="stylesheet" href="/css/department.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <header class="site-header" id="header"></header>
  <div class="header-spacer"></div>

  <main id="department-main">
    <!-- Rendered by JS -->
  </main>

  <footer class="site-footer" id="footer"></footer>
  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import DataManager from '/js/data-manager.js';

    document.addEventListener('DOMContentLoaded', async () => {
      await window.__csgDataReady;
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      let deptId = new URLSearchParams(window.location.search).get('id');
      if (!deptId && pathParts.includes('department') && pathParts.length >= 2) {
          deptId = pathParts[pathParts.indexOf('department') + 1];
      }
      const dept = DataManager.getDepartment(deptId);
      const main = document.getElementById('department-main');

      if (!dept) {
        main.innerHTML = `
          <section class="container" style="padding:100px 0;text-align:center;">
            <h1 style="color:var(--text-gold);">Không tìm thấy</h1>
            <a href="/about" class="btn-back"><i class="fas fa-arrow-left"></i> Về cóc</a>
          </section>`;
        return;
      }

      document.title = `${dept.name} - Cóc Sài Gòn`;

      // Update OG meta tags for social sharing
      const ogImage = dept.thumbnail || dept.image || '';
      if (ogImage) {
        document.querySelector('meta[property="og:image"]')?.setAttribute('content', ogImage);
        document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', ogImage);
      }
      const ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) { ogTitle.setAttribute('content', `${dept.name} - Cóc Sài Gòn`); }
      else { const m = document.createElement('meta'); m.setAttribute('property', 'og:title'); m.setAttribute('content', `${dept.name} - Cóc Sài Gòn`); document.head.appendChild(m); }
      const twTitle = document.querySelector('meta[name="twitter:title"]');
      if (twTitle) { twTitle.setAttribute('content', `${dept.name} - Cóc Sài Gòn`); }
      else { const m = document.createElement('meta'); m.setAttribute('name', 'twitter:title'); m.setAttribute('content', `${dept.name} - Cóc Sài Gòn`); document.head.appendChild(m); }

      // Build dept managers HTML
      const deptMembersHtml = (dept.members && dept.members.length > 0) ? `
        <div class="dept-managers" style="margin-top:32px; display:flex; flex-wrap:wrap; gap:16px; justify-content:center;">
          ${dept.members.map(m => `
            <div class="dept-manager-card" style="background:rgba(255,255,255,0.05); padding:16px 32px; border-radius:12px; border:1px solid rgba(255,222,33,0.2); min-width:220px; text-align:center; backdrop-filter:blur(10px);">
              <div class="dept-manager-role" style="color:var(--gold-primary); font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px;">${m.role}</div>
              <div class="dept-manager-name" style="color:#fff; font-size:1.15rem; font-weight:600;">${m.name}</div>
            </div>
          `).join('')}
        </div>
      ` : '';

      // Build teams HTML
      const teamsHtml = (dept.teams || []).map((team, index) => `
        <div class="dept-team-block ${index % 2 === 0 ? '' : 'reverse'} reveal">
          <div class="dept-team-image">
            <img src="${team.image}" alt="${team.name}" loading="lazy" />
          </div>
          <div class="dept-team-info">
            <h3>${team.name}</h3>
            <div class="dept-team-members">
              ${(team.members || []).map(m => `
                <div class="dept-member-row">
                  <span class="dept-member-name">${m.name}</span>
                  <span class="dept-member-role">${m.role}</span>
                </div>
              `).join('')}
            </div>
            <p class="dept-team-desc">${team.description || ''}</p>
          </div>
        </div>
      `).join('');

      main.innerHTML = `
        ${dept.image ? `
        <!-- Banner fixed aspect ratio -->
        <section class="dept-banner" style="width: 100%; aspect-ratio: 2000 / 734; overflow: hidden; background: #000;">
          <img src="${dept.image}" alt="${dept.name}" style="width: 100%; height: 100%; object-fit: cover;" />
        </section>
        ` : ''}

        <!-- Hero -->
        <section class="dept-hero" style="${!dept.image ? 'padding-top: 80px;' : 'padding-top: 48px; border-top: none;'}">
          <div class="container">
            <a href="/about" class="btn-back"><i class="fas fa-arrow-left"></i> Về cóc</a>
            <h1 class="dept-hero-title">${dept.name.toUpperCase()}</h1>
            <p class="dept-hero-desc" style="white-space: pre-wrap;">${dept.description || ''}</p>
            ${deptMembersHtml}
          </div>
        </section>

        <!-- Teams -->
        <section class="dept-teams-section">
          <div class="container">
            ${teamsHtml || '<p style="color:var(--text-secondary);text-align:center;padding:40px 0;">Chưa có thông tin đội nhóm.</p>'}
          </div>
        </section>
      `;

      // Re-init scroll reveal for new elements
      setTimeout(() => {
        const reveals = document.querySelectorAll('.reveal:not(.visible)');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        reveals.forEach(el => observer.observe(el));
      }, 100);
    });
  </script>
</body>
</html>
