<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinh danh - Cóc Sài Gòn</title>
  <meta name="description" content="Vinh danh ban chủ nhiệm và các thành viên xuất sắc của CLB Cóc Sài Gòn." />
  <link rel="icon" type="image/png" href="/csg-favicon.png" />
  <meta property="og:image" content="https://i.ibb.co/xkr0QFB/csg-thumb.jpg" />
  <meta name="twitter:image" content="https://i.ibb.co/xkr0QFB/csg-thumb.jpg" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/header.css" />
  <link rel="stylesheet" href="/css/footer.css" />
  <link rel="stylesheet" href="/css/hall-of-fame.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

  <header class="site-header" id="header"></header>
  <div class="header-spacer"></div>

  <main id="hof-main">
    <!-- Rendered dynamically via JS -->
  </main>

  <footer class="site-footer" id="footer"></footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import DataManager from '/js/data-manager.js';

    document.addEventListener('DOMContentLoaded', async () => {
      await window.__csgDataReady;
      const data = DataManager.get();
      const hallOfFame = data.hallOfFame || { individuals: { yearly: [], semesters: [] }, collectives: [] };
      const main = document.getElementById('hof-main');

      const createCard = (recipient, image, title) => `
        <div class="hof-card-compact reveal" style="text-align: center; background: #222222; box-shadow: 0 8px 24px rgba(0,0,0,0.6); padding: 16px; border-radius: var(--radius-md); border: 1px solid #444444; transition: all var(--transition-fast);">
          <div style="aspect-ratio: 4/5; width: 100%; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 16px;">
            <img src="${image}" alt="${recipient}" style="width: 100%; height: 100%; object-fit: cover;" />
          </div>
          <div style="font-size: 1.05rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">${recipient}</div>
          <div style="font-size: 0.8rem; color: var(--gold-primary); text-transform: uppercase; font-weight: 600;">${title}</div>
        </div>
      `;

      // 1. Hero
      const heroHtml = `
        <section class="hof-hero" id="hof-hero" style="padding: 100px 0 60px 0; text-align: center;">
          <div class="container">
            <p class="hof-hero-subtitle fade-in-up" style="max-width: 800px; margin: 0 auto; font-size: 1.15rem; line-height: 1.8; color: var(--text-secondary);">
              Nơi ghi nhận và tôn vinh những cá nhân, tập thể xuất sắc <br/> đã đóng góp vào sự phát triển của câu lạc bộ.
            </p>
          </div>
        </section>
      `;

      // State
      let currentMainTab = 'individuals'; // 'individuals' or 'collectives'
      let currentSubTab = 'yearly'; // 'yearly' or 'semesters'
      let currentSemester = 'ALL';
      let currentYear = 'ALL';
      let currentCategory = 'ALL';

      // Distinct semesters are gathered per tab below

      const renderContent = () => {
        let cardsHtml = '';
        let filterHtml = '';

        const dataSrc = currentMainTab === 'individuals' ? hallOfFame.individuals : hallOfFame.collectives;

        if (currentSubTab === 'yearly') {
          let currentYearsArray = [];
          let currentCategoriesArray = [];

          if (dataSrc && dataSrc.yearly) {
            currentYearsArray = Array.from(new Set(dataSrc.yearly.map(y => y.year)));
            
            dataSrc.yearly.forEach(y => {
              y.categories.forEach(c => {
                if (!currentCategoriesArray.includes(c.name)) {
                  currentCategoriesArray.push(c.name);
                }
              });
            });
          }

          if (currentYearsArray.length > 0 || currentCategoriesArray.length > 0) {
            const arrowSvgCat = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='${currentCategory !== 'ALL' ? '%23ffde21' : '%23a0a0a0'}' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>`;
            
            let categoryFilterHtml = `<select class="dropdown-filter" data-filter="category" style="padding: 8px 40px 8px 20px; border-radius: var(--radius-full); border: 1px solid ${currentCategory !== 'ALL' ? 'var(--gold-primary)' : 'var(--border-color)'}; background-color: ${currentCategory !== 'ALL' ? 'rgba(255,222,33,0.1)' : 'transparent'}; background-image: url('${arrowSvgCat}'); background-repeat: no-repeat; background-position: right 16px center; color: ${currentCategory !== 'ALL' ? 'var(--gold-primary)' : 'var(--text-secondary)'}; font-size: 0.9rem; outline: none; cursor: pointer; min-width: 220px; appearance: none; -webkit-appearance: none; -moz-appearance: none;">
              <option value="ALL" style="background: #1a1a1a; color: #fff;">Tất cả danh hiệu</option>
              ${currentCategoriesArray.map(c => `<option value="${c}" style="background: #1a1a1a; color: #fff;" ${currentCategory === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>`;

            const arrowSvgYear = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='${currentYear !== 'ALL' ? '%23ffde21' : '%23a0a0a0'}' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>`;

            let yearFilterHtml = `<select class="dropdown-filter" data-filter="year" style="padding: 8px 40px 8px 20px; border-radius: var(--radius-full); border: 1px solid ${currentYear !== 'ALL' ? 'var(--gold-primary)' : 'var(--border-color)'}; background-color: ${currentYear !== 'ALL' ? 'rgba(255,222,33,0.1)' : 'transparent'}; background-image: url('${arrowSvgYear}'); background-repeat: no-repeat; background-position: right 16px center; color: ${currentYear !== 'ALL' ? 'var(--gold-primary)' : 'var(--text-secondary)'}; font-size: 0.9rem; outline: none; cursor: pointer; min-width: 160px; appearance: none; -webkit-appearance: none; -moz-appearance: none;">
              <option value="ALL" style="background: #1a1a1a; color: #fff;">Tất cả năm</option>
              ${currentYearsArray.map(y => `<option value="${y}" style="background: #1a1a1a; color: #fff;" ${currentYear === String(y) ? 'selected' : ''}>Năm ${y}</option>`).join('')}
            </select>`;

            filterHtml = `
              <div class="yearly-filter" style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);">
                ${categoryFilterHtml}
                ${yearFilterHtml}
              </div>
            `;
          }

          if (dataSrc && dataSrc.yearly) {
            let filteredYearly = dataSrc.yearly;
            if (currentYear !== 'ALL') {
              filteredYearly = filteredYearly.filter(y => String(y.year) === String(currentYear));
            }

            cardsHtml = filteredYearly.map(y => {
              let filteredCategories = y.categories;
              if (currentCategory !== 'ALL') {
                filteredCategories = filteredCategories.filter(c => c.name === currentCategory);
              }
              return filteredCategories.map(c => 
                c.members.map(m => createCard(m.recipient, m.image, c.name + ' ' + y.year)).join('')
              ).join('');
            }).join('');
          }
        } else {
          // Semesters
          let currentSemestersArray = [];
          if (dataSrc && dataSrc.semesters) {
            currentSemestersArray = Array.from(new Set(dataSrc.semesters.map(s => s.semester)));
          }

          if (currentSemestersArray.length > 0) {
            let filterButtons = `<button class="filter-btn ${currentSemester === 'ALL' ? 'active' : ''}" data-sem="ALL" style="padding: 6px 16px; border-radius: var(--radius-full); border: 1px solid ${currentSemester === 'ALL' ? 'var(--gold-primary)' : 'var(--border-color)'}; background: ${currentSemester === 'ALL' ? 'rgba(255,222,33,0.1)' : 'transparent'}; color: ${currentSemester === 'ALL' ? 'var(--gold-primary)' : 'var(--text-secondary)'}; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;">Tất cả học kỳ</button>`;
            
            currentSemestersArray.forEach(sem => {
              filterButtons += `<button class="filter-btn ${currentSemester === sem ? 'active' : ''}" data-sem="${sem}" style="padding: 6px 16px; border-radius: var(--radius-full); border: 1px solid ${currentSemester === sem ? 'var(--gold-primary)' : 'var(--border-color)'}; background: ${currentSemester === sem ? 'rgba(255,222,33,0.1)' : 'transparent'}; color: ${currentSemester === sem ? 'var(--gold-primary)' : 'var(--text-secondary)'}; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;">${sem}</button>`;
            });

            filterHtml = `
              <div class="semester-filter" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);">
                ${filterButtons}
              </div>
            `;
          }

          if (dataSrc && dataSrc.semesters) {
            const filteredSemesters = currentSemester === 'ALL' 
              ? dataSrc.semesters 
              : dataSrc.semesters.filter(s => s.semester === currentSemester);

            cardsHtml = filteredSemesters.map(s => 
              s.categories.map(c => 
                c.members.map(m => createCard(m.recipient, m.image, c.name + ' ' + s.semester)).join('')
              ).join('')
            ).join('');
          }
        }

        const contentHtml = `
          <section class="hof-content" style="padding-bottom: 80px;">
            <div class="container">
              <!-- Layout Header: Tabs -->
              <div class="hof-tabs-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; flex-wrap: wrap; gap: 16px;">
                <div class="hof-main-tabs" style="display: flex; gap: 16px;">
                  <button class="main-tab-btn btn btn-outline" data-main-tab="individuals" style="padding: 6px 20px; ${currentMainTab === 'individuals' ? 'background: var(--gold-primary); color: #000;' : ''}">Cá nhân</button>
                  <button class="main-tab-btn btn btn-outline" data-main-tab="collectives" style="padding: 6px 20px; ${currentMainTab === 'collectives' ? 'background: var(--gold-primary); color: #000;' : ''}">Tập thể</button>
                </div>
                <!-- Always show Sub-tabs according to request -->
                <div class="hof-sub-tabs" id="master-sub-tabs" style="display: flex; gap: 8px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: var(--radius-full);">
                  <button class="sub-tab-btn" data-sub-tab="yearly" style="border-radius: var(--radius-full); border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; padding: 6px 20px; transition: all 0.2s; ${currentSubTab === 'yearly' ? 'background: #fff; color: #000;' : 'background: transparent; color: var(--text-secondary);'}">Năm</button>
                  <button class="sub-tab-btn" data-sub-tab="semesters" style="border-radius: var(--radius-full); border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; padding: 6px 20px; transition: all 0.2s; ${currentSubTab === 'semesters' ? 'background: #fff; color: #000;' : 'background: transparent; color: var(--text-secondary);'}">Học kỳ</button>
                </div>
              </div>

              ${filterHtml}

              <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; justify-content: start;">
                ${cardsHtml || '<p style="color: var(--text-secondary); grid-column: 1/-1;">Chưa có dữ liệu cho mục này.</p>'}
              </div>
            </div>
          </section>
        `;

        main.innerHTML = heroHtml + contentHtml;
        bindEvents();
      };

      const bindEvents = () => {
        document.querySelectorAll('.main-tab-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            currentMainTab = e.target.getAttribute('data-main-tab');
            currentSemester = 'ALL';
            currentYear = 'ALL';
            currentCategory = 'ALL';
            renderContent();
          });
        });

        document.querySelectorAll('.sub-tab-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            currentSubTab = e.target.getAttribute('data-sub-tab');
            currentSemester = 'ALL'; // Reset filter when switching
            currentYear = 'ALL';
            currentCategory = 'ALL';
            renderContent();
          });
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            currentSemester = e.target.getAttribute('data-sem');
            renderContent();
          });
        });

        document.querySelectorAll('.dropdown-filter').forEach(select => {
          select.addEventListener('change', (e) => {
            const filterType = e.target.getAttribute('data-filter');
            if (filterType === 'year') {
              currentYear = e.target.value;
            } else if (filterType === 'category') {
              currentCategory = e.target.value;
            }
            renderContent();
          });
        });

        // Trigger reveal animations
        setTimeout(() => {
          const reveals = document.querySelectorAll('.reveal:not(.visible), .fade-in-up:not(.visible)');
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.1 });
          reveals.forEach(el => observer.observe(el));
        }, 50);
      };

      // Initial render
      renderContent();

    });
  </script>
</body>
</html>
